
name: wa_fishing_maps
description: RipCharts-like fishing overlays for WA (SST, Chl-a, currents, altimetry, true color, wind)
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.1.0
  intl: ^0.19.0
  geolocator: ^12.0.0
  shared_preferences: ^2.2.2

flutter:
  uses-material-design: true
