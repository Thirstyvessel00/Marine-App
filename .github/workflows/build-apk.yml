name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

# Opt into Node.js 24 for all JavaScript-based actions used in this workflow.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 17) for Android/Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin a stable; you can bump to the latest stable at any time.
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor (sanity check)
        run: flutter doctor -v

      - name: Get packages
        run: flutter pub get

      # Optional: run static analysis and tests if you have them
      # - name: Analyze
      #   run: flutter analyze
      # - name: Test
      #   run: flutter test --no-pub

      - name: Build debug APK (unsigned)
        run: flutter build apk --debug

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      # -------- OPTIONAL: Release-signed build (enable when you have a keystore) --------
