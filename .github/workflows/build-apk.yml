name: Build Android APK (scaffold + migrate)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create clean Flutter scaffold
        run: |
          rm -rf tmp_scaffold
          flutter create -t app tmp_scaffold --platforms=android
          rsync -av --delete lib/ tmp_scaffold/lib/ || true
          if [ -d "assets" ]; then rsync -av assets/ tmp_scaffold/assets/; fi
          if [ -f "pubspec.yaml" ]; then cp pubspec.yaml tmp_scaffold/pubspec.yaml; fi

      - name: Pub get
        working-directory: tmp_scaffold
        run: flutter pub get

      - name: Build debug APK
        working-directory: tmp_scaffold
        run: flutter build apk --debug --verbose

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: tmp_scaffold/build/app/outputs/flutter-apk/app-debug.apk
