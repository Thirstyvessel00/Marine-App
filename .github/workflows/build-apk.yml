      # - name: Decode Android keystore
      #   if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      #   working-directory: tmp_scaffold
      #   run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/wa-offshore.keystore
      #
      # - name: Configure signing for release
      #   if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
