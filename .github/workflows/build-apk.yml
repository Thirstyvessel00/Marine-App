      #   run: |
      #     sed -i '/android {/a \
      #     signingConfigs { release { storeFile file("wa-offshore.keystore"); storePassword System.getenv("KEYSTORE_PWD"); keyAlias System.getenv("KEY_ALIAS"); keyPassword System.getenv("KEY_PWD"); } } \
      #     ' android/app/build.gradle
      #     sed -i '/buildTypes {/,/}/ s/release {/&\
      #             signingConfig signingConfigs.release/' android/app/build.gradle
      #
      # - name: Build release APK (signed)
      #   if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      #   working-directory: tmp_scaffold
      #   env:
      #     KEYSTORE_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
